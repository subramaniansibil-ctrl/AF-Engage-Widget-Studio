root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
include_ext = ["go", "tpl", "tmpl", "html"]
exclude_dir = ["assets", "tmp", "vendor"]
delay = 1000
stop_on_error = true
log = "build-errors.log"

[log]
main_only = false

[color]
main = "magenta"
watcher = "cyan"
builder = "green"
runner = "red"
