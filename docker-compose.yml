services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: af_engage
      POSTGRES_USER: af_engage
      POSTGRES_PASSWORD: af_engage_password
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U af_engage -d af_engage"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      target: dev
    working_dir: /app
    environment:
      APP_ENV: development
      HTTP_ADDRESS: :8080
      APP_DATA_MODE: ${APP_DATA_MODE:-postgres}
      DATABASE_URL: postgres://af_engage:af_engage_password@postgres:5432/af_engage?sslmode=disable
      MIGRATIONS_PATH: /app/migrations
    volumes:
      - ./backend:/app
      - go-mod-cache:/go/pkg/mod
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app
          ignore:
            - .git/
            - tmp/
            - bin/
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      target: dev
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      VITE_HOST: 0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /app
          ignore:
            - node_modules/
            - dist/
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres-data:
  go-mod-cache:
